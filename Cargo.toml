[package]
name = "zodl_ironwood_migration"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "Shared Orchard→Ironwood wallet migration engine (ported from vizor-wallet), consumed by libzcashlc (iOS) and backend-lib (Android)."
repository = "https://github.com/ZODL/ZODLIronwoodMigrationRust"

[features]
# During the core-TDD phase the default is empty so `cargo build` / `cargo test`
# exercise only the lightweight, valargroup-free core (fast, no git fetch).
# The backend bring-up step flips the default to ["librustzcash-backend"] and
# populates that feature with the real valargroup dependency activations.
default = []
librustzcash-backend = []

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# MUST single-version with zcash_client_sqlite 0.21 (which pins rusqlite 0.37).
rusqlite = { version = "0.37", features = ["bundled"] }
hex = "0.4"

[dev-dependencies]
tempfile = "3"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(zcash_unstable, values("nu6.3"))'] }
